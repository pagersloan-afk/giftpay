<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Base path for Flutter Web -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- App Title -->
  <title>UtilityHub – Smart Payments</title>

  <!-- Description (SEO) -->
  <meta name="description" content="UtilityHub – Fast, secure payments for electricity, airtime, data, and wallet services.">

  <!-- Keywords (SEO) -->
  <meta name="keywords" content="UtilityHub, payments, electricity, airtime, data, wallet, fintech">

  <!-- Social Preview -->
  <meta property="og:title" content="UtilityHub – Smart Payments">
  <meta property="og:description" content="Fast, secure payments for electricity, airtime, data, and wallet services.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:type" content="website">

  <!-- Force HTML Renderer (production safe) -->
  <meta name="flutter-web-renderer" content="html">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="UtilityHub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Android PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Paystack Web Popup -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- Disable caching (optional for production) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: https: http:;
                 script-src 'self' 'unsafe-inline' https://js.paystack.co;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: https:;
                 connect-src *;
                 frame-src https://js.paystack.co;">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>

<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Payment...</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
      text-align: center;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }
    .loader {
      border: 4px solid #eee;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Processing Payment...</h2>
    <p>Please wait while we verify your transaction.</p>
    <div class="loader"></div>
    <p id="statusText">Verifying payment...</p>
  </div>

  <script>
    async function processPayment() {
      const urlParams = new URLSearchParams(window.location.search);
      const reference = urlParams.get("reference");
      const userId = urlParams.get("userId");

      if (!reference) {
        document.getElementById("statusText").innerText =
          "Missing payment reference.";
        return;
      }

      // ⭐ Auto-detect backend base URL
      const BASE_URL = window.location.origin.replace(":5000", ":4000");

      try {
        // ⭐ Step 1: Verify payment
        const verifyRes = await fetch(
          `${BASE_URL}/verify/${reference}?userId=${userId}`
        );
        const verifyData = await verifyRes.json();

        if (!verifyData.status || verifyData.data.status !== "success") {
          document.getElementById("statusText").innerText =
            "Payment verification failed.";
          return;
        }

        const amount = verifyData.data.amount / 100;

        // ⭐ Step 2: Credit wallet
        await fetch(`${BASE_URL}/wallet/credit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId,
            amount,
            reference
          }),
        });

        // ⭐ Step 3: Redirect back to Flutter Web
        document.getElementById("statusText").innerText =
          "Payment successful! Redirecting...";

        setTimeout(() => {
          window.location.href = "http://localhost:5000/#/wallet";
        }, 1500);

      } catch (err) {
        document.getElementById("statusText").innerText =
          "Server error verifying payment.";
      }
    }

    processPayment();
  </script>
</body>
</html>

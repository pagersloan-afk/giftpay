name: utilityhub
description: "GiftPay is a next‑generation digital payment and banking platform that combines utility services with full financial capabilities. Pay bills, buy electricity, recharge airtime/data, manage your wallet, and send money instantly — all from one powerful, secure, and beautifully designed app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  provider: ^6.1.5+1
  http: ^1.6.0
  intl: ^0.20.2
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  flutter_paystack_plus: ^1.2.1
  image_picker: ^1.0.7
  firebase_storage: 13.2.0
  audioplayers: ^5.2.0
  confetti: ^0.7.0
  share_plus: 12.0.1
  path_provider: ^2.1.0
  pdf: ^3.10.7
  printing: ^5.13.1
  barcode_widget: ^2.0.4
  shimmer: ^3.0.0
  supabase_flutter: ^2.3.4
  country_picker: ^2.0.15
  universal_html: ^2.2.4
  flutter_native_splash: ^2.3.10
  url_launcher: ^6.2.5
  network_info_plus: ^7.0.0
  reorderables: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/success.png
